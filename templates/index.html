<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PhishGuard — AI Phishing Detector</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }
      .container {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        padding: 40px 30px;
        width: 100%;
        max-width: 550px;
        text-align: center;
        box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
      }
      .shield { font-size: 60px; margin-bottom: 10px; }
      h1 { color: #ffffff; font-size: 26px; margin-bottom: 10px; }
      p.subtitle {
        color: rgba(255, 255, 255, 0.6);
        margin-bottom: 25px;
        font-size: 14px;
      }
      input[type="text"] {
        width: 100%;
        padding: 13px 20px;
        border-radius: 10px;
        border: 2px solid rgba(255, 255, 255, 0.2);
        background: rgba(255, 255, 255, 0.1);
        color: white;
        font-size: 15px;
        outline: none;
        margin-bottom: 12px;
      }
      input[type="text"]::placeholder { color: rgba(255, 255, 255, 0.4); }
      input[type="text"]:focus { border-color: #667eea; }
      button {
        width: 100%;
        padding: 13px;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.3s;
      }
      button:hover { opacity: 0.9; }
      .nav-links {
        margin-top: 15px;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-wrap: nowrap;
        gap: 6px;
      }
      .nav-links a {
        color: rgba(255, 255, 255, 0.6);
        font-size: 13px;
        text-decoration: none;
        white-space: nowrap;
      }
      .nav-links a:hover { color: white; }
      .nav-links span {
        color: rgba(255, 255, 255, 0.3);
        font-size: 13px;
      }
      .result-box {
        margin-top: 20px;
        padding: 20px;
        border-radius: 15px;
        display: none;
      }
      .result-box.safe {
        background: rgba(0, 200, 100, 0.15);
        border: 2px solid rgba(0, 200, 100, 0.4);
      }
      .result-box.danger {
        background: rgba(255, 50, 50, 0.15);
        border: 2px solid rgba(255, 50, 50, 0.4);
      }
      .result-text { font-size: 20px; font-weight: bold; color: white; margin-bottom: 10px; }
      .confidence { color: rgba(255, 255, 255, 0.7); font-size: 14px; margin-bottom: 8px; }
      .url-checked { color: rgba(255, 255, 255, 0.5); font-size: 12px; word-break: break-all; }
      .loading { color: rgba(255, 255, 255, 0.7); margin-top: 15px; display: none; font-size: 14px; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="shield">🛡️</div>
      <h1>Phishing Website Detector</h1>
      <p class="subtitle">Enter any URL to check if it is safe or a phishing website</p>

      <input type="text" id="urlInput"
        placeholder="Enter URL e.g. http://example.com" />
      <button onclick="checkURL()">🔍 Check Now</button>

      <div class="nav-links">
        <a href="/history">📋 History</a>
        <span>|</span>
        <a href="/stats">📊 Statistics</a>
        <span>|</span>
        <a href="/about">ℹ️ About</a>
        <span>|</span>
        <a href="/logout">🚪 Logout</a>
      </div>

      <div class="loading" id="loading">⏳ Analyzing URL... please wait...</div>

      <div class="result-box" id="resultBox">
        <div class="result-text" id="resultText"></div>
        <div class="confidence" id="confidenceText"></div>
        <div class="url-checked" id="urlChecked"></div>
      </div>
    </div>

    <script>
      async function checkURL() {
        const url = document.getElementById("urlInput").value;
        if (!url) { alert("Please enter a URL!"); return; }
        document.getElementById("loading").style.display = "block";
        document.getElementById("resultBox").style.display = "none";
        const formData = new FormData();
        formData.append("url", url);
        const response = await fetch("/predict", { method: "POST", body: formData });
        const data = await response.json();
        document.getElementById("loading").style.display = "none";
        const box = document.getElementById("resultBox");
        box.style.display = "block";
        if (data.result.includes("SAFE")) {
          box.className = "result-box safe";
        } else {
          box.className = "result-box danger";
        }
        document.getElementById("resultText").innerHTML = data.result;
        document.getElementById("confidenceText").innerHTML = "🎯 Confidence: " + data.confidence;
        document.getElementById("urlChecked").innerHTML = "🔗 Checked: " + data.url;
      }
    </script>
  </body>
</html>
